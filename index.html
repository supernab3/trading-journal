      async function generateAiReview(trade) {
        if (!session?.user?.id || !supabaseClient) {
          setReviewError("Log in before generating AI reviews.");
          setReviewTradeId(trade.id);
          setReviewStatus({ type: "error", text: "AI review failed." });
          return;
        }

        const requestId = createTradeId();
        setReviewTradeId(trade.id);
        setReviewLoadingId(trade.id);
        setReviewError("");
        setReviewStatus({ type: "info", text: "Generating AI review with Gemini..." });

        try {
          const { data: sessionData, error: sessionError } = await supabaseClient.auth.getSession();
          const accessToken = sessionData?.session?.access_token || session.access_token;

          if (sessionError || !accessToken) {
            throw new Error("Your Supabase session expired. Please log in again before generating AI reviews.");
          }

          const controller = new AbortController();
          const timeoutId = window.setTimeout(() => controller.abort(), 45000);
          let response;

          try {
            response = await fetch(AI_REVIEW_ENDPOINT, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${accessToken}`,
                "X-Review-Request-Id": requestId
              },
              body: JSON.stringify({
                trade: buildTradeReviewPayload(trade)
              }),
              signal: controller.signal
            });
          } catch (error) {
            if (error.name === "AbortError") {
              throw new Error("Gemini review timed out. Please try again.");
            }

            throw new Error("Could not reach the AI review endpoint. Check the Vercel deployment and network connection.");
          } finally {
            window.clearTimeout(timeoutId);
          }

          const contentType = response.headers.get("content-type") || "";
          const responseBody = contentType.includes("application/json")
            ? await response.json().catch(() => ({}))
            : {
                error: "AI review endpoint returned non-JSON. Make sure /api/ai-review is deployed as a Vercel serverless function."
              };
          console.debug("[ai-review] endpoint response payload", {
            requestId: responseBody.requestId || requestId,
            review: responseBody.review,
            responseBody
          });

          if (!response.ok) {
            const serverRequestId = responseBody.requestId ? ` Request ID: ${responseBody.requestId}.` : "";
            throw new Error(`${responseBody.error || "AI review could not be generated."}${serverRequestId}`);
          }

          if (!responseBody.review) {
            throw new Error("AI review endpoint returned no review data.");
          }

          const aiReview = normalizeAiReview(responseBody.review);

          if (!aiReview) {
            throw new Error("AI returned an incomplete review.");
          }

          setReviewStatus({ type: "info", text: "Saving AI review to Supabase..." });
          setTrades((current) =>
            current.map((item) => (item.id === trade.id ? { ...item, aiReview } : item))
          );

          const { data, error } = await supabaseClient
            .from(TRADES_TABLE)
            .update({
              ai_review: aiReview,
              ai_review_created_at: aiReview.generatedAt || new Date().toISOString()
            })
            .eq("id", trade.id)
            .eq("user_id", session.user.id)
            .select()
            .single();
          console.debug("[ai-review] Supabase save response", {
            tradeId: trade.id,
            error,
            savedAiReview: data?.ai_review,
            normalizedSavedAiReview: normalizeAiReview(data?.ai_review, data?.ai_review_created_at)
          });

          if (error) {
            throw new Error(
              `AI review was generated, but Supabase could not save it. Run the ai_review SQL migration. ${error.message}`
            );
          }

          const savedTradeFromRow = fromTradeRow(data);
          const savedTrade = {
            ...(savedTradeFromRow || trade),
            aiReview: savedTradeFromRow?.aiReview || aiReview
          };

          setTrades((current) =>
            current.map((item) => (item.id === trade.id ? savedTrade : item))
          );
          setReviewStatus({ type: "success", text: "AI review generated and saved to Supabase." });
        } catch (error) {
          setReviewError(error.message || "AI review generation failed.");
          setReviewStatus({ type: "error", text: "AI review failed." });
        } finally {
          setReviewLoadingId(null);
        }
      }

          if (sessionError || !accessToken) {
            throw new Error("Your Supabase session expired. Please log in again before generating summaries.");
          }

          const controller = new AbortController();
          const timeoutId = window.setTimeout(() => controller.abort(), 50000);
          let response;

          try {
            response = await fetch(DAILY_SUMMARY_ENDPOINT, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${accessToken}`,
                "X-Summary-Request-Id": requestId
              },
              body: JSON.stringify({
                dailySummary: payload
              }),
              signal: controller.signal
            });
          } catch (error) {
            if (error.name === "AbortError") {
              throw new Error("Gemini daily summary timed out. Please try again.");
            }

            throw new Error("Could not reach the daily summary endpoint. Check the Vercel deployment and network connection.");
          } finally {
            window.clearTimeout(timeoutId);
          }

          const contentType = response.headers.get("content-type") || "";
          const responseBody = contentType.includes("application/json")
            ? await response.json().catch(() => ({}))
            : {
                error: "Daily summary endpoint returned non-JSON. Make sure /api/daily-summary is deployed as a Vercel serverless function."
              };

          if (!response.ok) {
            const serverRequestId = responseBody.requestId ? ` Request ID: ${responseBody.requestId}.` : "";
            throw new Error(`${responseBody.error || "Daily AI summary could not be generated."}${serverRequestId}`);
          }

          const summaryRow = responseBody.savedSummary
            ? fromDailySummaryRow(responseBody.savedSummary)
            : null;
          const normalizedSummary = normalizeDailySummary(responseBody.summary, summaryDate, responseBody.summary?.generatedAt);
          const nextSummary = summaryRow || {
            id: responseBody.requestId || requestId,
            userId: session.user.id,
            summaryDate,
            summary: normalizedSummary,
            createdAt: normalizedSummary?.generatedAt || new Date().toISOString()
          };

          if (!nextSummary.summary) {
            throw new Error("Daily summary endpoint returned no summary data.");
          }

          setDailySummaries((current) => upsertDailySummary(current, nextSummary));
          setSummaryStatus({ type: "success", text: "Daily AI summary generated and saved to Supabase." });
        } catch (error) {
          setSummaryError(error.message || "Daily AI summary generation failed.");
          setSummaryStatus({ type: "error", text: "Daily summary failed." });
        } finally {
          setSummaryLoadingDate("");
        }

                          >
                            {summaryLoadingDate === summaryItem.summaryDate && <span className="spinner"></span>}
                            {summaryLoadingDate === summaryItem.summaryDate ? "Regenerating..." : "Regenerate"}
                          </button>
                        </div>
                      </article>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </section>

          <section className="panel chart-panel" aria-label="Equity and daily profit charts">
            <div className="panel-header">
              <h2>Equity Curve</h2>
              <span className="panel-meta chart-summary">
                <span>{chartData.tradeCount} charted {chartData.tradeCount === 1 ? "trade" : "trades"}</span>
                <strong className={getResultClass(chartData.totalGrowth)}>
                  Growth {formatMoney(chartData.totalGrowth, true)}
                </strong>
              </span>
            </div>
            <div className="charts-grid">
              <article className="chart-card">
                <h3>Cumulative P/L</h3>
                <div className="chart-canvas-wrap">
                  {chartData.tradeCount === 0 && (
                    <div className="chart-empty">Add trades or adjust filters to build the equity curve.</div>
                  )}
                  <canvas ref={equityCanvasRef} aria-label="Cumulative profit and loss chart"></canvas>
                </div>
              </article>
              <article className="chart-card">
                <h3>Daily P/L</h3>
                <div className="chart-canvas-wrap">
                  {chartData.tradeCount === 0 && (
                    <div className="chart-empty">Daily P/L appears after matching trades are available.</div>
                  )}
                  <canvas ref={dailyCanvasRef} aria-label="Daily profit and loss chart"></canvas>
                </div>
              </article>
            </div>
          </section>

          <section className="panel backup-panel" aria-label="Journal backup tools">
            <div className="panel-header">
              <h2>Backup & Restore</h2>
              <span className="panel-meta">{trades.length} Supabase {trades.length === 1 ? "trade" : "trades"}</span>
            </div>
            <div className="backup-actions">
              <button
                className="btn btn-secondary"
                type="button"
                onClick={exportTradesAsCsv}
                disabled={trades.length === 0}
              >
                Export CSV
              </button>
              <button
                className="btn btn-secondary"
                type="button"
                onClick={exportTradesAsJson}
                disabled={trades.length === 0}
              >
                Export JSON
              </button>
              <button className="btn btn-primary" type="button" onClick={openImportPicker} disabled={isSaving}>
                Import JSON
              </button>
              <input
                ref={importInputRef}
                className="hidden-file-input"
                type="file"
                accept=".json,application/json"
                onChange={importTradesFromJson}
              />
            </div>
            {backupMessage.text && (
              <div className={`status-box status-${backupMessage.type}`}>
                {backupMessage.text}
              </div>
            )}
          </section>

          <section className="panel filters-panel" aria-label="Trade filters">
            <div className="panel-header">
              <h2>Filters</h2>
              <span className="panel-meta">
                Showing {filteredTradesWithResults.length} of {tradesWithResults.length}
              </span>
            </div>
            <div className="filters-grid">
              <div className="field">
                <label htmlFor="filterSearch">Search Symbol</label>
                <input
                  id="filterSearch"
                  name="search"
                  value={filters.search}
                  onChange={updateFilter}
                  placeholder="BTC, ETH, SOL"
                />
              </div>

              <div className="field">
                <label htmlFor="filterResult">Win / Loss</label>
                <select
                  id="filterResult"
                  name="result"
                  value={filters.result}
                  onChange={updateFilter}
                >
                  <option value="all">All Results</option>
                  <option value="win">Wins</option>
                  <option value="loss">Losses</option>
                </select>
              </div>

              <div className="field">
                <label htmlFor="filterType">Long / Short</label>
                <select
                  id="filterType"
                  name="tradeType"
                  value={filters.tradeType}
                  onChange={updateFilter}
                >
                  <option value="all">All Types</option>
                  <option value="long">Long</option>
                  <option value="short">Short</option>
                </select>
              </div>

              <div className="field">
                <label htmlFor="filterStartDate">From Date</label>
                <input
                  id="filterStartDate"
                  name="startDate"
                  type="date"
                  value={filters.startDate}
                  max={filters.endDate || undefined}
                  onChange={updateFilter}
                />
              </div>

              <div className="field">
                <label htmlFor="filterEndDate">To Date</label>
                <input
                  id="filterEndDate"
                  name="endDate"
                  type="date"
                  value={filters.endDate}
                  min={filters.startDate || undefined}
                  onChange={updateFilter}
                />
              </div>

              <button
                className="btn btn-secondary"
                type="button"
                onClick={resetFilters}
                disabled={!hasActiveFilters}
              >
                Reset Filters
              </button>
            </div>
          </section>

          <section className="main-grid">
            <aside className="panel">
              <div className="panel-header">
                <h2>{editingId ? "Edit Trade" : "Add Trade"}</h2>
              </div>

              <form className="trade-form" onSubmit={handleSubmit}>
                {error && <div className="error-box">{error}</div>}

                <div className="field-row">
                  <div className="field">
                    <label htmlFor="symbol">Pair / Symbol</label>
                    <input
                      id="symbol"
                      name="symbol"
                      value={form.symbol}
                      onChange={updateField}
                      placeholder="BTCUSDT"
                    />
                  </div>

                  <div className="field">
                    <label htmlFor="type">Trade Type</label>
                    <select id="type" name="type" value={form.type} onChange={updateField}>
                      <option value="long">Long</option>
                      <option value="short">Short</option>
                    </select>
                  </div>
                </div>

                <div className="field-row">
                  <div className="field">
                    <label htmlFor="entryPrice">Entry Price</label>
                    <input
                      id="entryPrice"
                      name="entryPrice"
                      type="number"
                      min="0"
                      step="any"
                      value={form.entryPrice}
                      onChange={updateField}
                      placeholder="65000"
                    />
                  </div>

                  <div className="field">
                    <label htmlFor="exitPrice">Exit Price</label>
                    <input
                      id="exitPrice"
                      name="exitPrice"
                      type="number"
                      min="0"
                      step="any"
                      value={form.exitPrice}
                      onChange={updateField}
                      placeholder="67000"
                    />
                  </div>
                </div>

                <div className="field-row">
                  <div className="field">
                    <label htmlFor="positionSize">Position Size (Qty)</label>
                    <input
                      id="positionSize"
                      name="positionSize"
                      type="number"
                      min="0"
                      step="any"
                      value={form.positionSize}
                      onChange={updateField}
                      placeholder="0.05"
                    />
                  </div>

                  <div className="field">
                    <label htmlFor="date">Date</label>
                    <input
                      id="date"
                      name="date"
                      type="date"
                      value={form.date}
                      onChange={updateField}
                    />
                  </div>
                </div>

                <div className="field-row">
                  <div className="field">
                    <label htmlFor="accountBalanceBefore">Account Balance Before</label>
                    <input
                      id="accountBalanceBefore"
                      name="accountBalanceBefore"
                      type="number"
                      min="0"
                      step="any"
                      value={form.accountBalanceBefore}
                      onChange={updateField}
                      placeholder="10000"
                    />
                  </div>

                  <div className="field">
                    <label htmlFor="riskAmount">Risk Amount</label>
                    <input
                      id="riskAmount"
                      name="riskAmount"
                      type="number"
                      min="0"
                      step="any"
                      value={form.riskAmount}
                      onChange={updateField}
                      placeholder="200"
                    />
                  </div>
                </div>

                <div className="field-row">
                  <div className="field">
                    <label htmlFor="stopLossPrice">Stop Loss Price</label>
                    <input
                      id="stopLossPrice"
                      name="stopLossPrice"
                      type="number"
                      min="0"
                      step="any"
                      value={form.stopLossPrice}
                      onChange={updateField}
                      placeholder="64000"
                    />
                  </div>

                  <div className="field">
                    <label htmlFor="takeProfitPrice">Take Profit Price</label>
                    <input
                      id="takeProfitPrice"
                      name="takeProfitPrice"
                      type="number"
                      min="0"
                      step="any"
                      value={form.takeProfitPrice}
                      onChange={updateField}
                      placeholder="69000"
                    />
                  </div>
                </div>

                <div className="field">
                  <label htmlFor="emotion">Emotion</label>
                  <input
                    id="emotion"
                    name="emotion"
                    value={form.emotion}
                    onChange={updateField}
                    placeholder="Calm, anxious, confident"
                  />
                </div>

                <div className="field">
                  <label htmlFor="screenshotUrl">Screenshot URL</label>
                  <input
                    id="screenshotUrl"
                    name="screenshotUrl"
                    type="url"
                    value={form.screenshotUrl}
                    onChange={updateField}
                    placeholder="https://example.com/chart.png"
                  />
                </div>

                <div className="field">
                  <label>Upload Chart Screenshot</label>
                  <div className="upload-row">
                    <button className="btn btn-secondary" type="button" onClick={openScreenshotPicker}>
                      Choose Image
                    </button>
                    {form.screenshotImage && (
                      <button className="btn btn-danger" type="button" onClick={removeScreenshotImage}>
                        Remove Image
                      </button>
                    )}
                    <span className="upload-hint">
                      JPG, PNG, WebP, or GIF up to {formatFileSize(MAX_SCREENSHOT_SIZE_BYTES)}.
                    </span>
                    <input
                      ref={screenshotInputRef}
                      className="hidden-file-input"
                      type="file"
                      accept={ALLOWED_SCREENSHOT_TYPES.join(",")}
                      onChange={handleScreenshotUpload}
                    />
                  </div>
                  {form.screenshotImage && (
                    <div className="screenshot-preview-card">
                      <img src={form.screenshotImage.dataUrl} alt="Selected chart screenshot preview" />
                      <div className="screenshot-preview-meta">
                        <strong>{form.screenshotImage.name}</strong>
                        <span>{formatFileSize(form.screenshotImage.size)} saved as base64</span>
                      </div>
                    </div>
                  )}
                </div>

                <div className="field">
                  <label htmlFor="notes">Notes</label>
                  <textarea
                    id="notes"
                    name="notes"
                    value={form.notes}
                    onChange={updateField}
                    placeholder="Setup, reason for entry, lesson learned"
                  />
                </div>

                <div className="form-actions">
                  {editingId && (
                    <button className="btn btn-secondary" type="button" onClick={resetForm}>
                      Cancel
                    </button>
                  )}
                  <button className="btn btn-primary" type="submit" disabled={isSaving}>
                    {isSaving ? "Saving..." : editingId ? "Save Changes" : "Add Trade"}
                  </button>
                </div>
              </form>
            </aside>

            <section className="panel table-panel">
              <div className="panel-header">
                <h2>All Trades</h2>
                <span className="panel-meta">
                  {filteredTradesWithResults.length} shown
                </span>
              </div>

              {filteredTradesWithResults.length === 0 ? (
                <div className="empty-state">
                  <strong>{tradesWithResults.length === 0 ? "No trades yet" : "No matching trades"}</strong>
                  {tradesWithResults.length === 0
                    ? "Your trades will appear here after you add them."
                    : "Adjust or clear the filters to see more trades."}
                </div>
              ) : (
                <div className="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>Date</th>
                        <th>Symbol</th>
                        <th>Type</th>
                        <th>Entry</th>
                        <th>Exit</th>
                        <th>Size (Qty)</th>
                        <th>P/L</th>
                        <th>P/L %</th>
                        <th>Risk</th>
                        <th>R:R</th>
                        <th>Emotion</th>
                        <th>Notes</th>
                        <th>Screenshot</th>
                        <th>Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filteredTradesWithResults.map((trade) => {
                        return (
                          <tr key={trade.id}>
                            <td data-label="Date">{trade.date}</td>
                            <td data-label="Symbol" className="symbol-cell">{trade.symbol}</td>
                            <td data-label="Type">
                              <span className={`type-badge type-${trade.type}`}>
                                {trade.type}
                              </span>
                            </td>
                            <td data-label="Entry">{formatNumber(trade.entryPrice)}</td>
                            <td data-label="Exit">{formatNumber(trade.exitPrice)}</td>
                            <td data-label="Size">{formatNumber(trade.positionSize)}</td>
                            <td data-label="P/L" className={getResultClass(trade.profitLoss)}>
                              {formatMoney(trade.profitLoss, true)}
                            </td>
                            <td data-label="P/L %" className={getResultClass(trade.profitLossPercent)}>
                              {formatPercent(trade.profitLossPercent)}
                            </td>
                            <td data-label="Risk">
                              {trade.riskPercent > 0 ? (
                                <span className={`risk-badge ${trade.isHighRisk ? "risk-warning" : "risk-ok"}`}>
                                  {trade.isHighRisk ? "High " : ""}{formatRiskPercent(trade.riskPercent)}
                                </span>
                              ) : (
                                "-"
                              )}
                            </td>
                            <td data-label="R:R">
                              {trade.rewardRiskRatio > 0 ? formatRatio(trade.rewardRiskRatio) : "-"}
                            </td>
                            <td data-label="Emotion">{trade.emotion || "-"}</td>
                            <td data-label="Notes" className="notes-cell">{trade.notes || "-"}</td>
                            <td data-label="Screenshot" className="screenshot-cell">
                              {trade.screenshotImage || trade.screenshotUrl ? (
                                <div className="screenshot-links">
                                  {trade.screenshotImage && (
                                    <button
                                      className="thumbnail-button"
                                      type="button"
                                      onClick={() => setPreviewImage({
                                        ...trade.screenshotImage,
                                        symbol: trade.symbol,
                                        date: trade.date
                                      })}
                                      title="Open screenshot preview"
                                    >
                                      <img
                                        className="trade-thumbnail"
                                        src={trade.screenshotImage.dataUrl}
                                        alt={`${trade.symbol} chart screenshot`}
                                      />
                                    </button>
                                  )}
                                  {trade.screenshotUrl && (
                                    <a href={trade.screenshotUrl} target="_blank" rel="noreferrer">
                                      Open URL
                                    </a>
                                  )}
                                </div>
                              ) : (
                                "-"
                              )}
                            </td>
                            <td data-label="Actions">
                              <div className="actions-cell">
                                <button
                                  className="btn btn-primary btn-small"
                                  type="button"
                                  onClick={() => generateAiReview(trade)}
                                  disabled={isSaving || Boolean(reviewLoadingId)}
                                >
                                  {reviewLoadingId === trade.id && <span className="spinner"></span>}
                                  {reviewLoadingId === trade.id
                                    ? "Reviewing..."
                                    : trade.aiReview
                                      ? "Regenerate AI Review"
                                      : "Generate AI Review"}
                                </button>
                                {trade.aiReview && (
                                  <button
                                    className="btn btn-secondary btn-small"
                                    type="button"
                                    onClick={() => openAiReview(trade)}
                                    disabled={isSaving}
                                  >
                                    View AI Review
                                  </button>
                                )}
                                <button
                                  className="btn btn-secondary btn-small"
                                  type="button"
                                  onClick={() => editTrade(trade)}
                                  disabled={isSaving}
                                >
                                  Edit
                                </button>
                                <button
                                  className="btn btn-danger btn-small"
                                  type="button"
                                  onClick={() => deleteTrade(trade.id)}
                                  disabled={isSaving}
                                >
                                  Delete
                                </button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </section>
          </section>

          {selectedDailySummaryDate && (
            <div
              className="modal-backdrop"
              role="dialog"
              aria-modal="true"
              aria-label="Daily AI trading summary"
              onClick={closeDailySummary}
            >
              <div className="modal-panel daily-summary-modal" onClick={(event) => event.stopPropagation()}>
                <div className="modal-header">
                  <div className="modal-title">
                    <strong>Daily AI summary</strong>
                    <span>{selectedDailySummaryDate}</span>
                  </div>
                  <button className="btn btn-secondary btn-small" type="button" onClick={closeDailySummary}>
                    Close
                  </button>
                </div>
                <div className="daily-summary-body">
                  {summaryStatus.text && (
                    <div className={`status-box status-${summaryStatus.type || "info"}`}>
                      {summaryStatus.text}
                    </div>
                  )}

                  {summaryError && (
                    <div className="error-box">{summaryError}</div>
                  )}

                  {summaryLoadingDate === selectedDailySummaryDate && (
                    <div className="ai-loading-card" aria-live="polite">
                      <span className="spinner"></span>
                      <strong>Generating daily summary...</strong>
                      <span>Reviewing today's trades, emotions, risk, and process notes.</span>
                    </div>
                  )}

                  {selectedDailySummary?.summary && (
                    <DailySummaryContent summary={selectedDailySummary.summary} />
                  )}

                  {!selectedDailySummary?.summary && summaryLoadingDate !== selectedDailySummaryDate && (
                    <div className="empty-state">
                      <strong>No summary saved for this date</strong>
                      Generate a summary for this date after logging trades.
                    </div>
                  )}

                  <div className="daily-summary-actions">
                    <button
                      className="btn btn-primary"
                      type="button"
                      onClick={() => generateDailySummary(selectedDailySummaryDate)}
                      disabled={Boolean(summaryLoadingDate)}
                    >
                      {summaryLoadingDate === selectedDailySummaryDate && <span className="spinner"></span>}
                      {summaryLoadingDate === selectedDailySummaryDate
                        ? "Generating..."
                        : selectedDailySummary
                          ? "Regenerate Summary"
                          : "Generate Summary"}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {selectedReviewTrade && (
            <div
              className="modal-backdrop"
              role="dialog"
              aria-modal="true"
              aria-label="AI trade review"
              onClick={closeAiReview}
            >
              <div className="modal-panel ai-review-modal" onClick={(event) => event.stopPropagation()}>
                <div className="modal-header">
                  <div className="modal-title">
                    <strong>{selectedReviewTrade.symbol} AI trade review</strong>
                    <span>
                      {selectedReviewTrade.date} - {selectedReviewTrade.type} - {formatMoney(selectedReviewTrade.profitLoss, true)}
                    </span>
                  </div>
                  <button className="btn btn-secondary btn-small" type="button" onClick={closeAiReview}>
                    Close
                  </button>
                </div>
                <div className="ai-review-body">
                  <div className="ai-review-trade-strip">
                    <strong>{selectedReviewTrade.symbol}</strong>
                    <span>R:R {selectedReviewTrade.rewardRiskRatio > 0 ? formatRatio(selectedReviewTrade.rewardRiskRatio) : "not logged"}</span>
                    <span>Risk {selectedReviewTrade.riskPercent > 0 ? formatRiskPercent(selectedReviewTrade.riskPercent) : "not logged"}</span>
                    <span className={getResultClass(selectedReviewTrade.profitLoss)}>
                      P/L {formatMoney(selectedReviewTrade.profitLoss, true)}
                    </span>
                  </div>

                  {reviewStatus.text && (
                    <div className={`status-box status-${reviewStatus.type || "info"}`}>
                      {reviewStatus.text}
                    </div>
                  )}

                  {reviewError && (
                    <div className="error-box">{reviewError}</div>
                  )}

                  {reviewLoadingId === selectedReviewTrade.id && (
                    <div className="ai-loading-card" aria-live="polite">
                      <span className="spinner"></span>
                      <strong>Generating AI review...</strong>
                      <span>Checking entry, exit, risk, emotion, and process notes.</span>
                    </div>
                  )}

                  {selectedReviewTrade.aiReview && (
                    <AiReviewContent review={selectedReviewTrade.aiReview} />
                  )}

                  {!selectedReviewTrade.aiReview && reviewLoadingId !== selectedReviewTrade.id && (
                    <div className="empty-state">
                      <strong>No AI review yet</strong>
                      Generate a review to get concise process feedback for this trade.
                    </div>
                  )}

                  <div className="ai-review-actions">
                    <button
                      className="btn btn-primary"
                      type="button"
                      onClick={() => generateAiReview(selectedReviewTrade)}
                      disabled={isSaving || Boolean(reviewLoadingId)}
                    >
                      {reviewLoadingId === selectedReviewTrade.id && <span className="spinner"></span>}
                      {reviewLoadingId === selectedReviewTrade.id
                        ? "Reviewing..."
                        : selectedReviewTrade.aiReview
                          ? "Regenerate AI Review"
                          : "Generate AI Review"}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {previewImage && (
            <div
              className="modal-backdrop"
              role="dialog"
              aria-modal="true"
              aria-label="Chart screenshot preview"
              onClick={() => setPreviewImage(null)}
            >
              <div className="modal-panel" onClick={(event) => event.stopPropagation()}>
                <div className="modal-header">
                  <div className="modal-title">
                    <strong>{previewImage.symbol} chart screenshot</strong>
                    <span>
                      {previewImage.date} - {previewImage.name} - {formatFileSize(previewImage.size)}
                    </span>
                  </div>
                  <button className="btn btn-secondary btn-small" type="button" onClick={() => setPreviewImage(null)}>
                    Close
                  </button>
                </div>
                <div className="modal-body">
                  <img src={previewImage.dataUrl} alt={`${previewImage.symbol} full chart screenshot`} />
                </div>
              </div>
            </div>
          )}
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
