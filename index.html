<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Journal</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
  <style>
    :root {
      --bg: #f4f6f8;
      --shell: #101820;
      --shell-soft: #172331;
      --surface: #ffffff;
      --surface-muted: #f7f9fb;
      --text: #141b24;
      --muted: #647180;
      --line: #dfe5ec;
      --line-strong: #c7d1dc;
      --primary: #147d8f;
      --primary-dark: #0f6372;
      --green: #10805b;
      --green-soft: #e8f7f1;
      --red: #c44040;
      --red-soft: #fdeceb;
      --amber: #b7791f;
      --amber-soft: #fff5df;
      --shadow: 0 18px 45px rgba(17, 24, 39, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, var(--shell) 0, var(--shell) 278px, var(--bg) 278px, var(--bg) 100%),
        linear-gradient(135deg, rgba(20, 125, 143, 0.14), rgba(183, 121, 31, 0.10));
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.65;
    }

    a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .app-shell {
      margin: 0 auto;
      padding: 28px 0 36px;
      width: min(1220px, calc(100% - 32px));
    }

    .topbar {
      align-items: flex-end;
      color: #ffffff;
      display: flex;
      gap: 18px;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    .eyebrow {
      color: #76d0df;
      font-size: 0.76rem;
      font-weight: 900;
      letter-spacing: 0.12em;
      margin: 0 0 8px;
      text-transform: uppercase;
    }

    h1 {
      font-size: clamp(2rem, 4.6vw, 3.4rem);
      line-height: 1;
      margin: 0;
    }

    .subtitle {
      color: #aab8c7;
      font-size: 0.98rem;
      margin: 10px 0 0;
      max-width: 620px;
    }

    .storage-dot {
      background: #21c58a;
      border-radius: 999px;
      box-shadow: 0 0 0 4px rgba(33, 197, 138, 0.12);
      height: 8px;
      width: 8px;
    }

    .user-actions {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .user-pill {
      align-items: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      color: #d9e2ea;
      display: inline-flex;
      font-size: 0.88rem;
      font-weight: 800;
      gap: 8px;
      max-width: min(340px, 100%);
      overflow: hidden;
      padding: 9px 13px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .auth-shell {
      align-items: center;
      display: grid;
      min-height: 100vh;
      padding: 28px 0;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid rgba(223, 229, 236, 0.95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin: 0 auto;
      overflow: hidden;
      width: min(460px, calc(100% - 32px));
    }

    .auth-card-header {
      background: linear-gradient(180deg, #ffffff, var(--surface-muted));
      border-bottom: 1px solid var(--line);
      padding: 22px;
    }

    .auth-card-header h1 {
      color: var(--text);
      font-size: 1.8rem;
      line-height: 1.08;
    }

    .auth-card-header .subtitle {
      color: var(--muted);
      margin-top: 8px;
    }

    .auth-form {
      display: grid;
      gap: 14px;
      padding: 20px 22px 22px;
    }

    .auth-switch {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 750;
      text-align: center;
    }

    .auth-switch button {
      background: transparent;
      border: 0;
      color: var(--primary);
      font-weight: 900;
      padding: 0;
    }

    .loading-state {
      color: var(--muted);
      font-weight: 850;
      padding: 18px;
      text-align: center;
    }

    .panel.loading-state {
      margin-bottom: 18px;
    }

    .spinner {
      animation: spin 0.8s linear infinite;
      border: 2px solid rgba(20, 125, 143, 0.18);
      border-left-color: var(--primary);
      border-radius: 50%;
      display: inline-block;
      flex: 0 0 auto;
      height: 18px;
      width: 18px;
    }

    .btn .spinner {
      border-color: rgba(255, 255, 255, 0.36);
      border-left-color: #ffffff;
      height: 14px;
      width: 14px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .stats-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 18px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid rgba(223, 229, 236, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-height: 138px;
      overflow: hidden;
      padding: 18px;
      position: relative;
    }

    .stat-card::before {
      content: "";
      height: 4px;
      left: 0;
      position: absolute;
      right: 0;
      top: 0;
    }

    .stat-primary::before {
      background: var(--primary);
    }

    .stat-green::before {
      background: var(--green);
    }

    .stat-red::before {
      background: var(--red);
    }

    .stat-amber::before {
      background: var(--amber);
    }

    .stat-header {
      align-items: center;
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stat-chip {
      background: var(--surface-muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      padding: 5px 8px;
    }

    .stat-value {
      font-size: clamp(1.55rem, 3vw, 2.25rem);
      font-weight: 900;
      line-height: 1.05;
      overflow-wrap: anywhere;
    }

    .stat-detail {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 10px;
      min-height: 20px;
    }

    .profit {
      color: var(--green);
    }

    .loss {
      color: var(--red);
    }

    .neutral {
      color: var(--muted);
    }

    .main-grid {
      align-items: start;
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(320px, 390px) minmax(0, 1fr);
    }

    .panel {
      background: var(--surface);
      border: 1px solid rgba(223, 229, 236, 0.95);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      align-items: center;
      background: linear-gradient(180deg, #ffffff, var(--surface-muted));
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      justify-content: space-between;
      padding: 17px 18px 14px;
    }

    .panel-header h2 {
      font-size: 1rem;
      font-weight: 900;
      margin: 0;
    }

    .panel-meta {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .filters-panel {
      margin-bottom: 18px;
    }

    .filters-grid {
      align-items: end;
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(210px, 1.35fr) repeat(4, minmax(135px, 1fr)) auto;
      padding: 16px 18px;
    }

    .filters-grid .btn {
      min-height: 42px;
      white-space: nowrap;
    }

    .advanced-panel {
      margin-bottom: 18px;
    }

    .advanced-stats-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      padding: 16px 18px;
    }

    .advanced-stats-grid .stat-card {
      box-shadow: none;
      min-height: 126px;
    }

    .chart-panel {
      margin-bottom: 18px;
    }

    .chart-summary {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
    }

    .chart-summary strong {
      font-size: 1rem;
      font-weight: 900;
    }

    .charts-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      padding: 16px 18px 18px;
    }

    .chart-card {
      background: var(--surface-muted);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
    }

    .chart-card h3 {
      font-size: 0.92rem;
      font-weight: 900;
      margin: 0 0 12px;
    }

    .chart-canvas-wrap {
      height: 310px;
      position: relative;
    }

    .chart-canvas-wrap canvas {
      height: 100% !important;
      width: 100% !important;
    }

    .chart-empty {
      align-items: center;
      color: var(--muted);
      display: flex;
      font-size: 0.92rem;
      font-weight: 800;
      inset: 0;
      justify-content: center;
      pointer-events: none;
      position: absolute;
      text-align: center;
      z-index: 1;
    }

    .backup-panel {
      margin-bottom: 18px;
    }

    .backup-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 16px 18px;
    }

    .backup-actions .btn {
      min-width: 140px;
    }

    .hidden-file-input {
      display: none;
    }

    .upload-row {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .upload-hint {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .screenshot-preview-card {
      align-items: center;
      background: var(--surface-muted);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: flex;
      gap: 12px;
      padding: 10px;
    }

    .screenshot-preview-card img {
      aspect-ratio: 16 / 10;
      border-radius: 6px;
      border: 1px solid var(--line);
      object-fit: cover;
      width: 120px;
    }

    .screenshot-preview-meta {
      color: var(--muted);
      display: grid;
      flex: 1;
      font-size: 0.84rem;
      gap: 3px;
      min-width: 0;
    }

    .screenshot-preview-meta strong {
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .trade-form {
      display: grid;
      gap: 14px;
      padding: 18px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: #31404f;
      font-size: 0.82rem;
      font-weight: 850;
    }

    .field input,
    .field select,
    .field textarea {
      background: #fbfcfe;
      border: 1px solid #cbd5df;
      border-radius: 7px;
      color: var(--text);
      min-height: 42px;
      outline: none;
      padding: 10px 12px;
      width: 100%;
    }

    .field textarea {
      min-height: 92px;
      resize: vertical;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(20, 125, 143, 0.15);
    }

    .field-row {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }

    .error-box {
      background: var(--red-soft);
      border: 1px solid rgba(196, 64, 64, 0.24);
      border-radius: 7px;
      color: var(--red);
      font-size: 0.9rem;
      font-weight: 700;
      padding: 10px 12px;
    }

    .status-box {
      border-top: 1px solid var(--line);
      font-size: 0.9rem;
      font-weight: 800;
      padding: 12px 18px;
    }

    .status-success {
      background: var(--green-soft);
      color: var(--green);
    }

    .status-error {
      background: var(--red-soft);
      color: var(--red);
    }

    .status-info {
      background: rgba(20, 125, 143, 0.10);
      color: var(--primary-dark);
    }

    .form-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .btn {
      align-items: center;
      border: 1px solid transparent;
      border-radius: 7px;
      display: inline-flex;
      font-weight: 850;
      gap: 8px;
      justify-content: center;
      min-height: 40px;
      padding: 10px 13px;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      text-decoration: none;
    }

    .btn-secondary {
      background: #fff;
      border-color: var(--line-strong);
      color: #2d3a45;
    }

    .btn-secondary:hover {
      border-color: #9eacba;
    }

    .btn-danger {
      background: var(--red-soft);
      color: var(--red);
    }

    .btn-small {
      min-height: 34px;
      padding: 7px 10px;
    }

    .table-panel {
      min-width: 0;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      border-collapse: collapse;
      min-width: 1240px;
      width: 100%;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 13px 12px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #eef3f7;
      color: #526071;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    td {
      color: #283541;
      font-size: 0.9rem;
    }

    tbody tr:hover {
      background: #fbfcfe;
    }

    .symbol-cell {
      color: var(--text);
      font-weight: 900;
      white-space: nowrap;
    }

    .type-badge {
      border-radius: 999px;
      display: inline-flex;
      font-size: 0.72rem;
      font-weight: 900;
      padding: 5px 9px;
      text-transform: uppercase;
    }

    .type-long {
      background: var(--green-soft);
      color: var(--green);
    }

    .type-short {
      background: var(--red-soft);
      color: var(--red);
    }

    .risk-badge {
      border-radius: 999px;
      display: inline-flex;
      font-size: 0.72rem;
      font-weight: 900;
      padding: 5px 9px;
      white-space: nowrap;
    }

    .risk-ok {
      background: var(--green-soft);
      color: var(--green);
    }

    .risk-warning {
      background: var(--red-soft);
      color: var(--red);
    }

    .notes-cell {
      color: var(--muted);
      max-width: 210px;
      white-space: normal;
      word-break: break-word;
    }

    .screenshot-cell {
      min-width: 92px;
    }

    .thumbnail-button {
      background: transparent;
      border: 0;
      border-radius: 7px;
      display: inline-flex;
      padding: 0;
    }

    .thumbnail-button:focus {
      box-shadow: 0 0 0 3px rgba(20, 125, 143, 0.18);
      outline: none;
    }

    .trade-thumbnail {
      aspect-ratio: 16 / 10;
      border: 1px solid var(--line);
      border-radius: 7px;
      object-fit: cover;
      width: 78px;
    }

    .screenshot-links {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .actions-cell {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 190px;
      white-space: normal;
    }

    .actions-cell .btn {
      white-space: nowrap;
    }

    .empty-state {
      color: var(--muted);
      padding: 46px 24px;
      text-align: center;
    }

    .empty-state strong {
      color: var(--text);
      display: block;
      font-size: 1.05rem;
      margin-bottom: 7px;
    }

    .modal-backdrop {
      align-items: center;
      background: rgba(16, 24, 32, 0.72);
      display: flex;
      inset: 0;
      justify-content: center;
      padding: 18px;
      position: fixed;
      z-index: 20;
    }

    .modal-panel {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
      max-height: min(92vh, 900px);
      overflow: hidden;
      width: min(980px, 100%);
    }

    .modal-header {
      align-items: center;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 12px;
      justify-content: space-between;
      padding: 14px 16px;
    }

    .modal-title {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .modal-title strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .modal-title span {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .modal-body {
      background: #0f1720;
      display: grid;
      max-height: calc(92vh - 72px);
      place-items: center;
      padding: 14px;
    }

    .modal-body img {
      border-radius: 6px;
      max-height: calc(92vh - 104px);
      max-width: 100%;
      object-fit: contain;
    }

    .ai-review-modal {
      width: min(760px, 100%);
    }

    .ai-review-body {
      background: var(--surface);
      display: grid;
      gap: 14px;
      max-height: calc(92vh - 72px);
      overflow-y: auto;
      padding: 16px;
    }

    .ai-review-trade-strip {
      align-items: center;
      background: var(--surface-muted);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      padding: 12px;
    }

    .ai-review-trade-strip strong {
      color: var(--text);
      font-size: 1rem;
    }

    .ai-review-trade-strip span {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 800;
    }

    .ai-loading-card {
      align-items: center;
      background: var(--surface-muted);
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      display: grid;
      gap: 8px;
      justify-items: center;
      padding: 28px 18px;
      text-align: center;
    }

    .ai-loading-card span:last-child {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 750;
    }

    .ai-review-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .ai-review-summary {
      background: linear-gradient(180deg, #ffffff, var(--surface-muted));
      border-bottom: 1px solid var(--line);
      color: #2a3743;
      font-size: 0.95rem;
      font-weight: 800;
      line-height: 1.45;
      padding: 14px;
    }

    .ai-review-grid {
      display: grid;
      gap: 0;
    }

    .ai-review-row {
      align-items: start;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 10px;
      grid-template-columns: minmax(130px, 0.8fr) minmax(0, 2fr);
      padding: 13px 14px;
    }

    .ai-review-row:last-child {
      border-bottom: 0;
    }

    .ai-review-label {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .ai-review-label strong {
      color: var(--text);
      font-size: 0.86rem;
      font-weight: 900;
    }

    .ai-score {
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 900;
      padding: 4px 8px;
      white-space: nowrap;
    }

    .ai-score-high {
      background: var(--green-soft);
      color: var(--green);
    }

    .ai-score-mid {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .ai-score-low {
      background: var(--red-soft);
      color: var(--red);
    }

    .ai-review-row p,
    .ai-review-section p {
      color: #405060;
      font-size: 0.92rem;
      font-weight: 650;
      line-height: 1.45;
      margin: 0;
    }

    .ai-review-raw p {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ai-review-section {
      border-top: 1px solid var(--line);
      display: grid;
      gap: 9px;
      padding: 14px;
    }

    .ai-review-section h3 {
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 900;
      margin: 0;
    }

    .ai-review-section ul {
      color: #405060;
      display: grid;
      font-size: 0.92rem;
      font-weight: 650;
      gap: 7px;
      line-height: 1.45;
      margin: 0;
      padding-left: 20px;

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;
    const SUPABASE_URL = "https://spuqofvejpbktfuwiwsy.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_BxzvNWXpNDLkPiYpRNtvNQ_4Pd83yqi";
    const TRADES_TABLE = "trades";
    const DAILY_SUMMARIES_TABLE = "daily_ai_summaries";
    const AI_REVIEW_ENDPOINT = "/api/ai-review";
    const DAILY_SUMMARY_ENDPOINT = "/api/daily-summary";
    const AI_REVIEW_DISCLAIMER = "Educational review only; not financial advice or a guarantee of future results.";
    const DAILY_SUMMARY_DISCLAIMER = "Educational trading journal summary only; not financial advice or a guarantee of future results.";
    const SUPABASE_KEY_IS_SECRET = SUPABASE_ANON_KEY.startsWith("sb_secret_");
    const SUPABASE_IS_CONFIGURED =
      SUPABASE_URL.startsWith("https://") &&
      !SUPABASE_URL.includes("YOUR-PROJECT-REF") &&
      !SUPABASE_ANON_KEY.includes("YOUR-SUPABASE-PUBLISHABLE-OR-ANON-KEY") &&
      !SUPABASE_KEY_IS_SECRET;
    const supabaseClient =
      SUPABASE_IS_CONFIGURED && window.supabase
        ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
        : null;
    const MAX_SCREENSHOT_SIZE_BYTES = 750 * 1024;
    const MAX_SCREENSHOT_DATA_URL_LENGTH = Math.ceil(MAX_SCREENSHOT_SIZE_BYTES * 1.4);
    const ALLOWED_SCREENSHOT_TYPES = ["image/jpeg", "image/png", "image/webp", "image/gif"];
    const RISK_WARNING_PERCENT = 2;
    const DEFAULT_FILTERS = {
      search: "",
      result: "all",
      tradeType: "all",
      startDate: "",
      endDate: ""
    };
    const AI_REVIEW_FIELDS = [
      { key: "entryQuality", label: "Entry Quality" },
      { key: "exitQuality", label: "Exit Quality" },
      { key: "riskManagement", label: "Risk Management" },
      { key: "emotionalDiscipline", label: "Emotional Discipline" },
      { key: "rewardRiskRatio", label: "Reward-to-Risk Ratio" }
    ];

    function getTodayDate() {
      const today = new Date();
      const localTime = today.getTime() - today.getTimezoneOffset() * 60000;
      return new Date(localTime).toISOString().slice(0, 10);
    }

    function getDefaultForm() {
      return {
        symbol: "",
        type: "long",
        entryPrice: "",
        exitPrice: "",
        positionSize: "",
        accountBalanceBefore: "",
        riskAmount: "",
        stopLossPrice: "",
        takeProfitPrice: "",
        date: getTodayDate(),
        emotion: "",
        notes: "",
        screenshotUrl: "",
        screenshotImage: null
      };
    }

    function getSupabaseSetupError() {
      if (SUPABASE_KEY_IS_SECRET) {
        return "Do not use an sb_secret key in this browser app. Use a Supabase publishable key or legacy anon key instead.";
      }

      if (!SUPABASE_IS_CONFIGURED) {
        return "Add your Supabase publishable key or legacy anon key in index.html before using the online journal.";
      }

      if (!window.supabase) {
        return "Supabase could not load. Check your internet connection and refresh the page.";
      }

      return "";
    }

    function parseTradeNumber(value) {
      if (typeof value === "string" && value.trim() === "") {
        return NaN;
      }

      if (typeof value !== "string" && typeof value !== "number") {
        return NaN;
      }

      const number = Number(value);
      return Number.isFinite(number) ? number : NaN;
    }

    function parseOptionalTradeNumber(value) {
      if (value === null || value === undefined || value === "") {
        return null;
      }

      if (typeof value === "string" && value.trim() === "") {
        return null;
      }

      const number = parseTradeNumber(value);
      return Number.isFinite(number) && number > 0 ? number : null;
    }

    function hasValidTradeNumbers(trade) {
      return trade.entryPrice > 0 && trade.exitPrice > 0 && trade.positionSize > 0;
    }

    function isValidDateString(value) {
      if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) {
        return false;
      }

      const [year, month, day] = value.split("-").map(Number);
      const date = new Date(Date.UTC(year, month - 1, day));
      return !Number.isNaN(date.getTime()) && date.toISOString().slice(0, 10) === value;
    }

    function normalizeTradeDate(value) {
      const date = String(value || "").trim();
      return isValidDateString(date) ? date : getTodayDate();
    }

    function formatFileSize(bytes) {
      if (!Number.isFinite(bytes)) {
        return "0 KB";
      }

      return bytes >= 1024 * 1024
        ? `${(bytes / (1024 * 1024)).toFixed(2)} MB`
        : `${Math.ceil(bytes / 1024)} KB`;
    }

    function isValidScreenshotImage(image) {
      return Boolean(
        image &&
        typeof image === "object" &&
        typeof image.dataUrl === "string" &&
        image.dataUrl.startsWith("data:image/") &&
        ALLOWED_SCREENSHOT_TYPES.includes(image.type) &&
        Number.isFinite(image.size) &&
        image.size > 0 &&
        image.size <= MAX_SCREENSHOT_SIZE_BYTES &&
        image.dataUrl.length <= MAX_SCREENSHOT_DATA_URL_LENGTH
      );
    }

    function normalizeScreenshotImage(image) {
      if (!isValidScreenshotImage(image)) {
        return null;
      }

      return {
        name: String(image.name || "chart-screenshot").trim().slice(0, 120),
        type: image.type,
        size: image.size,
        dataUrl: image.dataUrl
      };
    }

    function normalizeReviewScore(value) {
      const score = Number(value);

      if (!Number.isFinite(score)) {
        return 3;
      }

      return Math.min(5, Math.max(1, Math.round(score)));
    }

    function normalizeStringList(value) {
      if (typeof value === "string" && value.trim()) {
        return [value.trim()].slice(0, 3);
      }

      if (!Array.isArray(value)) {
        return [];
      }

      return value
        .map((item) => String(item || "").trim())
        .filter(Boolean)
        .slice(0, 3);
    }

    function stripReviewCodeFence(value) {
      return String(value || "")
        .trim()
        .replace(/^```(?:json|markdown|md)?\s*/i, "")
        .replace(/\s*```$/i, "")
        .trim();
    }

    function parseReviewJsonString(value) {
      if (typeof value !== "string") {
        return null;
      }

      const trimmedValue = stripReviewCodeFence(value);

      if (!trimmedValue) {
        return null;
      }

      try {
        return JSON.parse(trimmedValue);
      } catch (error) {
        const firstBrace = trimmedValue.indexOf("{");
        const lastBrace = trimmedValue.lastIndexOf("}");

        if (firstBrace >= 0 && lastBrace > firstBrace) {
          try {
            return JSON.parse(trimmedValue.slice(firstBrace, lastBrace + 1));
          } catch (nestedError) {
            return null;
          }
        }

        return null;
      }
    }

    function firstReviewString(...values) {
      for (const value of values) {
        if (typeof value === "string" && value.trim()) {
          return value.trim();
        }

        if (Array.isArray(value)) {
          const joinedValue = value
            .map((item) => typeof item === "string" ? item.trim() : "")
            .filter(Boolean)
            .join("\n");

          if (joinedValue) {
            return joinedValue;
          }
        }
      }

      return "";
    }

    function getFallbackReviewText(review) {
      if (typeof review === "string") {
        return stripReviewCodeFence(review);
      }

      if (Array.isArray(review)) {
        return review.map((item) => String(item || "").trim()).filter(Boolean).join("\n");
      }

      if (!review || typeof review !== "object") {
        return "";
      }

      const directText = firstReviewString(
        review.rawText,
        review.raw_text,
        review.reviewText,
        review.review_text,
        review.markdown,
        review.text,
        review.content,
        review.output,
        review.response,
        review.message,
        review.result
      );

      if (directText) {
        return stripReviewCodeFence(directText);
      }

      if (!review.summary && !review.assessments && !review.improvementSuggestion && !review.improvement_suggestion) {
        try {
          return JSON.stringify(review, null, 2);
        } catch (error) {
          return String(review);
        }
      }

      return "";
    }

    function createRawAiReview(rawText, fallbackGeneratedAt = "") {
      const text = stripReviewCodeFence(rawText);

      if (!text) {
        return null;
      }

      const firstLine = text.split("\n").map((line) => line.trim()).find(Boolean) || "AI review";

      return {
        summary: firstLine.replace(/^#+\s*/, "").slice(0, 220),
        assessments: {
          entryQuality: "",
          exitQuality: "",
          riskManagement: "",
          emotionalDiscipline: "",
          rewardRiskRatio: ""
        },
        scores: {
          entryQuality: 3,
          exitQuality: 3,
          riskManagement: 3,
          emotionalDiscipline: 3,
          rewardRiskRatio: 3
        },
        possibleMistakes: [],
        improvementSuggestion: "",
        disclaimer: AI_REVIEW_DISCLAIMER,
        generatedAt: String(fallbackGeneratedAt || "").trim(),
        model: "",
        usage: null,
        rawText: text,
        isRawText: true
      };
    }

    function normalizeAiReview(review, fallbackGeneratedAt = "") {
      if (typeof review === "string") {
        const parsedReview = parseReviewJsonString(review);

        if (parsedReview) {
          return normalizeAiReview(parsedReview, fallbackGeneratedAt);
        }

        return createRawAiReview(review, fallbackGeneratedAt);
      }

      if (Array.isArray(review)) {
        return createRawAiReview(review, fallbackGeneratedAt);
      }

      if (!review || typeof review !== "object") {
        return null;
      }

      const nestedReview = review.review || review.aiReview || review.ai_review;

      if (nestedReview && !review.summary && !review.assessments && !review.improvementSuggestion && !review.improvement_suggestion) {
        const normalizedNestedReview = normalizeAiReview(nestedReview, fallbackGeneratedAt);

        if (normalizedNestedReview) {
          return normalizedNestedReview;
        }
      }

      const fallbackText = getFallbackReviewText(review);
      const parsedFallbackText = parseReviewJsonString(fallbackText);

      if (parsedFallbackText) {
        const normalizedParsedText = normalizeAiReview(parsedFallbackText, fallbackGeneratedAt);

        if (normalizedParsedText) {
          return normalizedParsedText;
        }
      }

      const assessments = review.assessments && typeof review.assessments === "object"
        ? review.assessments
        : (review.analysis && typeof review.analysis === "object" ? review.analysis : {});
      const scores = review.scores && typeof review.scores === "object"
        ? review.scores
        : (review.rating && typeof review.rating === "object" ? review.rating : {});
      const usage = review.usage && typeof review.usage === "object"
        ? {
            inputTokens: Number(review.usage.inputTokens || review.usage.input_tokens || 0),
            outputTokens: Number(review.usage.outputTokens || review.usage.output_tokens || 0),
            totalTokens: Number(review.usage.totalTokens || review.usage.total_tokens || 0)
          }
        : null;
      const normalizedReview = {
        summary: firstReviewString(review.summary, review.overview, review.title),
        assessments: {
          entryQuality: firstReviewString(assessments.entryQuality, assessments.entry_quality, review.entryQuality, review.entry_quality),
          exitQuality: firstReviewString(assessments.exitQuality, assessments.exit_quality, review.exitQuality, review.exit_quality),
          riskManagement: firstReviewString(assessments.riskManagement, assessments.risk_management, review.riskManagement, review.risk_management),
          emotionalDiscipline: firstReviewString(assessments.emotionalDiscipline, assessments.emotional_discipline, review.emotionalDiscipline, review.emotional_discipline),
          rewardRiskRatio: firstReviewString(assessments.rewardRiskRatio, assessments.reward_risk_ratio, review.rewardRiskRatio, review.reward_risk_ratio)
        },
        scores: {
          entryQuality: normalizeReviewScore(scores.entryQuality || scores.entry_quality),
          exitQuality: normalizeReviewScore(scores.exitQuality || scores.exit_quality),
          riskManagement: normalizeReviewScore(scores.riskManagement || scores.risk_management),
          emotionalDiscipline: normalizeReviewScore(scores.emotionalDiscipline || scores.emotional_discipline),
          rewardRiskRatio: normalizeReviewScore(scores.rewardRiskRatio || scores.reward_risk_ratio)
        },
        possibleMistakes: normalizeStringList(review.possibleMistakes || review.possible_mistakes || review.mistakes || review.possibleErrors),
        improvementSuggestion: firstReviewString(
          review.improvementSuggestion,
          review.improvement_suggestion,
          review.suggestion,
          review.recommendation,
          review.nextStep,
          review.next_step,
          review.improvement
        ),
        disclaimer: String(review.disclaimer || AI_REVIEW_DISCLAIMER).trim(),
        generatedAt: String(review.generatedAt || review.generated_at || fallbackGeneratedAt || "").trim(),
        model: String(review.model || "").trim(),
        usage,
        rawText: fallbackText,
        isRawText: false
      };

      const hasStructuredText =
        normalizedReview.summary ||
        normalizedReview.improvementSuggestion ||
        Object.values(normalizedReview.assessments).some(Boolean) ||
        normalizedReview.possibleMistakes.length > 0;

      if (!hasStructuredText && fallbackText) {
        return createRawAiReview(fallbackText, fallbackGeneratedAt);
      }

      if (!hasStructuredText) {
        return null;
      }

      return normalizedReview;
    }

    function roundTo(value, decimals = 2) {
      const multiplier = 10 ** decimals;
      const rounded = Math.round((value + Number.EPSILON) * multiplier) / multiplier;
      return Object.is(rounded, -0) ? 0 : rounded;
    }

    function roundToCurrency(value) {
      return roundTo(value, 2);
    }

    function normalizeTrade(trade) {
      if (!trade || typeof trade !== "object") {
        return null;
      }

      const normalizedTrade = {
        id: trade.id || createTradeId(),
        symbol: String(trade.symbol || "").trim().toUpperCase(),
        type: trade.type === "short" ? "short" : "long",
        entryPrice: parseTradeNumber(trade.entryPrice),
        exitPrice: parseTradeNumber(trade.exitPrice),
        positionSize: parseTradeNumber(trade.positionSize),
        accountBalanceBefore: parseOptionalTradeNumber(trade.accountBalanceBefore),
        riskAmount: parseOptionalTradeNumber(trade.riskAmount),
        stopLossPrice: parseOptionalTradeNumber(trade.stopLossPrice),
        takeProfitPrice: parseOptionalTradeNumber(trade.takeProfitPrice),
        date: normalizeTradeDate(trade.date),
        emotion: String(trade.emotion || "").trim(),
        notes: String(trade.notes || "").trim(),
        screenshotUrl: String(trade.screenshotUrl || "").trim(),
        screenshotImage: normalizeScreenshotImage(trade.screenshotImage),
        aiReview: normalizeAiReview(
          trade.aiReview || trade.ai_review,
          trade.aiReviewCreatedAt || trade.ai_review_created_at
        )
      };

      if (!normalizedTrade.symbol || !hasValidTradeNumbers(normalizedTrade)) {
        return null;
      }

      return normalizedTrade;
    }

    function toTradeRow(trade, userId) {
      const normalizedTrade = normalizeTrade(trade);

      if (!normalizedTrade || !userId) {
        return null;
      }

      const row = {
        user_id: userId,
        symbol: normalizedTrade.symbol,
        trade_type: normalizedTrade.type,
        entry_price: normalizedTrade.entryPrice,
        exit_price: normalizedTrade.exitPrice,
        position_size: normalizedTrade.positionSize,
        account_balance_before: normalizedTrade.accountBalanceBefore,
        risk_amount: normalizedTrade.riskAmount,
        stop_loss_price: normalizedTrade.stopLossPrice,
        take_profit_price: normalizedTrade.takeProfitPrice,
        trade_date: normalizedTrade.date,
        emotion: normalizedTrade.emotion,
        notes: normalizedTrade.notes,
        screenshot_url: normalizedTrade.screenshotUrl,
        screenshot_image: normalizedTrade.screenshotImage
      };

      if (normalizedTrade.aiReview) {
        row.ai_review = normalizedTrade.aiReview;
        row.ai_review_created_at = normalizedTrade.aiReview.generatedAt || new Date().toISOString();
      }

      return row;
    }

    function fromTradeRow(row) {
      return normalizeTrade({
        id: row.id,
        symbol: row.symbol,
        type: row.trade_type,
        entryPrice: row.entry_price,
        exitPrice: row.exit_price,
        positionSize: row.position_size,
        accountBalanceBefore: row.account_balance_before,
        riskAmount: row.risk_amount,
        stopLossPrice: row.stop_loss_price,
        takeProfitPrice: row.take_profit_price,
        date: row.trade_date,
        emotion: row.emotion,
        notes: row.notes,
        screenshotUrl: row.screenshot_url,
        screenshotImage: row.screenshot_image,
        aiReview: row.ai_review,
        aiReviewCreatedAt: row.ai_review_created_at
      });
    }

    function ensureUniqueTradeIds(trades) {
      const usedIds = new Set();

      return trades.map((trade) => {
        const baseId = String(trade.id || "").trim() || createTradeId();
        let id = baseId;
        let suffix = 1;

        while (usedIds.has(id)) {
          id = `${baseId}-${suffix}`;
          suffix += 1;
        }

        usedIds.add(id);
        return { ...trade, id };
      });
    }

    function calculatePriceMove(trade) {
      return trade.type === "short"
        ? trade.entryPrice - trade.exitPrice
        : trade.exitPrice - trade.entryPrice;
    }

    function calculateProfitLoss(trade) {
      if (!hasValidTradeNumbers(trade)) {
        return 0;
      }

      return roundToCurrency(calculatePriceMove(trade) * trade.positionSize);
    }

    function calculateProfitLossPercent(trade) {
      if (!hasValidTradeNumbers(trade)) {
        return 0;
      }

      return roundTo((calculatePriceMove(trade) / trade.entryPrice) * 100, 4);
    }

    function calculateRiskPercent(trade) {
      if (!trade.accountBalanceBefore || !trade.riskAmount) {
        return 0;
      }

      return roundTo((trade.riskAmount / trade.accountBalanceBefore) * 100, 4);
    }

    function calculateRewardRiskRatio(trade) {
      if (!trade.stopLossPrice || !trade.takeProfitPrice || !hasValidTradeNumbers(trade)) {
        return 0;
      }

      const riskPerUnit = trade.type === "short"
        ? trade.stopLossPrice - trade.entryPrice
        : trade.entryPrice - trade.stopLossPrice;
      const rewardPerUnit = trade.type === "short"
        ? trade.entryPrice - trade.takeProfitPrice
        : trade.takeProfitPrice - trade.entryPrice;

      if (riskPerUnit <= 0 || rewardPerUnit <= 0) {
        return 0;
      }

      return roundTo(rewardPerUnit / riskPerUnit, 2);
    }

    function addTradeResults(trade) {
      const riskPercent = calculateRiskPercent(trade);

      return {
        ...trade,
        profitLoss: calculateProfitLoss(trade),
        profitLossPercent: calculateProfitLossPercent(trade),
        riskPercent,
        rewardRiskRatio: calculateRewardRiskRatio(trade),
        isHighRisk: riskPercent > RISK_WARNING_PERCENT
      };
    }

    function formatMoney(value, showSign = false) {
      const numericValue = Number.isFinite(value) ? value : 0;
      const prefix = showSign && numericValue > 0 ? "+" : "";

      return prefix + new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        maximumFractionDigits: 2
      }).format(numericValue);
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("en-US", {
        maximumFractionDigits: 8
      }).format(Number.isFinite(value) ? value : 0);
    }

    function formatPercent(value) {
      const numericValue = Number.isFinite(value) ? value : 0;
      const prefix = numericValue > 0 ? "+" : "";
      return `${prefix}${numericValue.toFixed(2)}%`;
    }

    function formatWinRate(value) {
      return `${(Number.isFinite(value) ? value : 0).toFixed(1)}%`;
    }

    function formatRiskPercent(value) {
      return `${(Number.isFinite(value) ? value : 0).toFixed(2)}%`;
    }

    function formatRatio(value) {
      if (value === Infinity) {
        return "No Losses";
      }

      return (Number.isFinite(value) ? value : 0).toFixed(2);
    }

    function getResultClass(value) {
      if (value > 0) {
        return "profit";
      }

      if (value < 0) {
        return "loss";
      }

      return "neutral";
    }

    function isValidScreenshotUrl(value) {
      const trimmedValue = value.trim();

      if (!trimmedValue) {
        return true;
      }

      try {
        const url = new URL(trimmedValue);
        return url.protocol === "http:" || url.protocol === "https:";
      } catch (error) {
        return false;
      }
    }

    function validateScreenshotFile(file) {
      if (!file) {
        return "Choose an image file first.";
      }

      if (!ALLOWED_SCREENSHOT_TYPES.includes(file.type)) {
        return "Screenshot must be a JPG, PNG, WebP, or GIF image.";
      }

      if (file.size > MAX_SCREENSHOT_SIZE_BYTES) {
        return `Screenshot must be ${formatFileSize(MAX_SCREENSHOT_SIZE_BYTES)} or smaller.`;
      }

      return "";
    }

    function createScreenshotImage(file, dataUrl) {
      return normalizeScreenshotImage({
        name: file.name,
        type: file.type,
        size: file.size,
        dataUrl
      });
    }

    function tradeMatchesFilters(trade, filters) {
      const searchTerm = filters.search.trim().toLowerCase();
      const matchesSearch = !searchTerm || trade.symbol.toLowerCase().includes(searchTerm);
      const matchesType = filters.tradeType === "all" || trade.type === filters.tradeType;
      const matchesStartDate = !filters.startDate || trade.date >= filters.startDate;
      const matchesEndDate = !filters.endDate || trade.date <= filters.endDate;
      const matchesResult =
        filters.result === "all" ||
        (filters.result === "win" && trade.profitLoss > 0) ||
        (filters.result === "loss" && trade.profitLoss < 0);

      return matchesSearch && matchesType && matchesStartDate && matchesEndDate && matchesResult;
    }

    function calculateStats(trades) {
      const totals = trades.reduce((current, trade) => {
        const profitLoss = trade.profitLoss;
        current.totalProfit += profitLoss;

        if (profitLoss > 0) {
          current.winningTrades += 1;
          current.grossProfit += profitLoss;
        }

        if (profitLoss < 0) {
          current.losingTrades += 1;
          current.grossLoss += Math.abs(profitLoss);
          current.lossTotal += profitLoss;
        }

        if (trade.type === "long") {
          current.longTrades += 1;
          current.longWins += profitLoss > 0 ? 1 : 0;
        }

        if (trade.type === "short") {
          current.shortTrades += 1;
          current.shortWins += profitLoss > 0 ? 1 : 0;
        }

        if (!current.bestTrade || profitLoss > current.bestTrade.profitLoss) {
          current.bestTrade = trade;
        }

        if (!current.worstTrade || profitLoss < current.worstTrade.profitLoss) {
          current.worstTrade = trade;
        }

        if (trade.riskPercent > 0) {
          current.riskTradeCount += 1;
          current.totalRiskPercent += trade.riskPercent;
        }

        if (trade.riskPercent > current.highestRiskPercent) {
          current.highestRiskPercent = trade.riskPercent;
          current.highestRiskTrade = trade;
        }

        if (trade.isHighRisk) {
          current.highRiskTrades += 1;
        }

        return current;
      }, {
        totalProfit: 0,
        winningTrades: 0,
        losingTrades: 0,
        grossProfit: 0,
        grossLoss: 0,
        lossTotal: 0,
        longTrades: 0,
        shortTrades: 0,
        longWins: 0,
        shortWins: 0,
        bestTrade: null,
        worstTrade: null,
        riskTradeCount: 0,
        totalRiskPercent: 0,
        highestRiskPercent: 0,
        highestRiskTrade: null,
        highRiskTrades: 0
      });

      const totalTrades = trades.length;
      const totalProfit = roundToCurrency(totals.totalProfit);
      const grossProfit = roundToCurrency(totals.grossProfit);
      const grossLoss = roundToCurrency(totals.grossLoss);
      const winrate = totalTrades ? (totals.winningTrades / totalTrades) * 100 : 0;
      const averageWin = totals.winningTrades ? roundToCurrency(grossProfit / totals.winningTrades) : 0;
      const averageLoss = totals.losingTrades ? roundToCurrency(totals.lossTotal / totals.losingTrades) : 0;
      const profitFactor = grossLoss > 0 ? grossProfit / grossLoss : grossProfit > 0 ? Infinity : 0;
      const longWinRate = totals.longTrades ? (totals.longWins / totals.longTrades) * 100 : 0;
      const shortWinRate = totals.shortTrades ? (totals.shortWins / totals.shortTrades) * 100 : 0;
      const averageRiskPercent = totals.riskTradeCount
        ? roundTo(totals.totalRiskPercent / totals.riskTradeCount, 4)
        : 0;

      return {
        totalTrades,
        totalProfit,
        winrate,
        winningTrades: totals.winningTrades,
        losingTrades: totals.losingTrades,
        averageWin,
        averageLoss,
        profitFactor,
        bestTrade: totals.bestTrade,
        worstTrade: totals.worstTrade,
        longWinRate,
        shortWinRate,
        longTrades: totals.longTrades,
        shortTrades: totals.shortTrades,
        averageRiskPercent,
        highestRiskTrade: totals.highestRiskTrade,
        highRiskTrades: totals.highRiskTrades,
        riskTradeCount: totals.riskTradeCount
      };
    }

    function sortTradesByDate(trades) {
      return trades
        .map((trade, index) => ({ trade, index }))
        .sort((first, second) => {
          const dateSort = first.trade.date.localeCompare(second.trade.date);
          return dateSort || first.index - second.index;
        })
        .map((item) => item.trade);
    }

    function buildEquityCurveData(trades) {
      let cumulativeProfit = 0;

      return sortTradesByDate(trades).reduce((chartData, trade) => {
        cumulativeProfit = roundToCurrency(cumulativeProfit + trade.profitLoss);

        chartData.labels.push(`${trade.date} ${trade.symbol}`);
        chartData.values.push(cumulativeProfit);
        chartData.tooltips.push({
          symbol: trade.symbol,
          date: trade.date,
          profitLoss: trade.profitLoss,
          cumulativeProfit
        });

        return chartData;
      }, {
        labels: [],
        values: [],
        tooltips: []
      });
    }

    function buildDailyProfitLossData(trades) {
      const dailyTotals = new Map();

      sortTradesByDate(trades).forEach((trade) => {
        dailyTotals.set(
          trade.date,
          roundToCurrency((dailyTotals.get(trade.date) || 0) + trade.profitLoss)
        );
      });

      return {
        labels: Array.from(dailyTotals.keys()),
        values: Array.from(dailyTotals.values())
      };
    }

    function buildChartSeries(trades) {
      const equityCurve = buildEquityCurveData(trades);
      const dailyProfitLoss = buildDailyProfitLossData(trades);
      const totalGrowth = equityCurve.values.length
        ? equityCurve.values[equityCurve.values.length - 1]
        : 0;

      return {
        equityCurve,
        dailyProfitLoss,
        totalGrowth,
        tradeCount: trades.length
      };
    }

    function buildTradeReviewPayload(trade) {
      const tradeWithResults = addTradeResults(trade);

      return {
        symbol: tradeWithResults.symbol,
        type: tradeWithResults.type,
        date: tradeWithResults.date,
        entryPrice: tradeWithResults.entryPrice,
        exitPrice: tradeWithResults.exitPrice,
        positionSize: tradeWithResults.positionSize,
        accountBalanceBefore: tradeWithResults.accountBalanceBefore,
        riskAmount: tradeWithResults.riskAmount,
        stopLossPrice: tradeWithResults.stopLossPrice,
        takeProfitPrice: tradeWithResults.takeProfitPrice,
        profitLoss: tradeWithResults.profitLoss,
        profitLossPercent: tradeWithResults.profitLossPercent,
        riskPercent: tradeWithResults.riskPercent,
        rewardRiskRatio: tradeWithResults.rewardRiskRatio,
        riskWarningLevelPercent: RISK_WARNING_PERCENT,
        isHighRisk: tradeWithResults.isHighRisk,
        emotion: tradeWithResults.emotion || "Not provided",
        notes: tradeWithResults.notes || "Not provided"
      };
    }

    function normalizeDailySummaryText(value, fallback = "") {
      return String(value || fallback).trim();
    }

    function parseDailySummaryNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : 0;
    }

    function normalizeDailySummaryList(value) {
      const list = Array.isArray(value) ? value : [value];
      return list
        .map((item) => normalizeDailySummaryText(item))
        .filter(Boolean)
        .slice(0, 3);
    }

    function normalizeDailySummaryTrade(value) {
      if (!value || typeof value !== "object") {
        return {
          symbol: "",
          profitLoss: 0,
          note: "No trade available."
        };
      }

      return {
        symbol: normalizeDailySummaryText(value.symbol).toUpperCase(),
        profitLoss: parseDailySummaryNumber(value.profitLoss),
        note: normalizeDailySummaryText(value.note, "No extra note.")
      };
    }

    function normalizeDailySummary(summary, fallbackDate = "", fallbackCreatedAt = "") {
      if (typeof summary === "string") {
        const parsedSummary = parseReviewJsonString(summary);

        if (parsedSummary) {
          return normalizeDailySummary(parsedSummary, fallbackDate, fallbackCreatedAt);
        }

        return {
          summaryDate: fallbackDate || getTodayDate(),
          headline: stripReviewCodeFence(summary),
          totalTrades: 0,
          totalProfitLoss: 0,
          winRate: 0,
          bestTrade: normalizeDailySummaryTrade(null),
          worstTrade: normalizeDailySummaryTrade(null),
          mostRepeatedMistake: "No structured mistake field was returned.",
          emotionalPattern: "No structured emotional pattern was returned.",
          riskManagementQuality: "No structured risk assessment was returned.",
          topImprovementsForTomorrow: [],
          mentorNote: "",
          disclaimer: DAILY_SUMMARY_DISCLAIMER,
          generatedAt: fallbackCreatedAt || "",
          model: "",
          usage: null,
          rawText: stripReviewCodeFence(summary)
        };
      }

      if (!summary || typeof summary !== "object") {
        return null;
      }

      const nestedSummary = summary.summary || summary.dailySummary || summary.daily_summary;

      if (nestedSummary && !summary.headline && !summary.totalTrades && !summary.total_trades) {
        const normalizedNestedSummary = normalizeDailySummary(nestedSummary, fallbackDate, fallbackCreatedAt);

        if (normalizedNestedSummary) {
          return normalizedNestedSummary;
        }
      }

      return {
        summaryDate: normalizeDailySummaryText(summary.summaryDate || summary.summary_date, fallbackDate || getTodayDate()),
        headline: normalizeDailySummaryText(summary.headline || summary.summary || summary.overview, "Daily trading summary generated."),
        totalTrades: Math.max(0, Math.round(parseDailySummaryNumber(summary.totalTrades ?? summary.total_trades))),
        totalProfitLoss: parseDailySummaryNumber(summary.totalProfitLoss ?? summary.total_profit_loss ?? summary.totalPL ?? summary.total_pl),
        winRate: parseDailySummaryNumber(summary.winRate ?? summary.win_rate),
        bestTrade: normalizeDailySummaryTrade(summary.bestTrade || summary.best_trade),
        worstTrade: normalizeDailySummaryTrade(summary.worstTrade || summary.worst_trade),
        mostRepeatedMistake: normalizeDailySummaryText(
          summary.mostRepeatedMistake || summary.most_repeated_mistake,
          "No repeated mistake was clear from today's logs."
        ),
        emotionalPattern: normalizeDailySummaryText(
          summary.emotionalPattern || summary.emotional_pattern,
          "No strong emotional pattern was logged."
        ),
        riskManagementQuality: normalizeDailySummaryText(
          summary.riskManagementQuality || summary.risk_management_quality,
          "Risk management quality was unclear from today's logs."
        ),
        topImprovementsForTomorrow: normalizeDailySummaryList(
          summary.topImprovementsForTomorrow || summary.top_improvements_for_tomorrow || summary.improvements
        ),
        mentorNote: normalizeDailySummaryText(summary.mentorNote || summary.mentor_note),
        disclaimer: normalizeDailySummaryText(summary.disclaimer, DAILY_SUMMARY_DISCLAIMER),
        generatedAt: normalizeDailySummaryText(summary.generatedAt || summary.generated_at, fallbackCreatedAt),
        model: normalizeDailySummaryText(summary.model),
        usage: summary.usage && typeof summary.usage === "object" ? summary.usage : null,
        rawText: normalizeDailySummaryText(summary.rawText || summary.raw_text)
      };
    }

    function fromDailySummaryRow(row) {
      if (!row || typeof row !== "object") {
        return null;
      }

      const summary = normalizeDailySummary(row.summary_json, row.summary_date, row.created_at);

      if (!summary) {
        return null;
      }

      return {
        id: row.id,
        userId: row.user_id,
        summaryDate: row.summary_date || summary.summaryDate,
        summary,
        createdAt: row.created_at || summary.generatedAt
      };
    }

    function sortDailySummaries(summaries) {
      return [...summaries].sort((first, second) =>
        String(second.summaryDate || "").localeCompare(String(first.summaryDate || ""))
      );
    }

    function upsertDailySummary(currentSummaries, nextSummary) {
      const filteredSummaries = currentSummaries.filter((summary) => summary.summaryDate !== nextSummary.summaryDate);
      return sortDailySummaries([nextSummary, ...filteredSummaries]);
    }

    function getReviewTextForDailySummary(aiReview) {
      const normalizedReview = normalizeAiReview(aiReview);

      if (!normalizedReview) {
        return "";
      }

      return [
        normalizedReview.summary,
        ...Object.values(normalizedReview.assessments || {}),
        ...(normalizedReview.possibleMistakes || []),
        normalizedReview.improvementSuggestion,
        normalizedReview.rawText
      ]
        .map((item) => normalizeDailySummaryText(item))
        .filter(Boolean)
        .join(" ");
    }

    function buildDailySummaryPayload(summaryDate, trades) {
      const dailyTrades = trades.filter((trade) => trade.date === summaryDate);
      const metrics = calculateStats(dailyTrades);

      return {
        summaryDate,
        metrics: {
          totalTrades: metrics.totalTrades,
          totalProfitLoss: metrics.totalProfit,
          winRate: metrics.winrate,
          averageRiskPercent: metrics.averageRiskPercent,
          highRiskTrades: metrics.highRiskTrades,
          bestTrade: metrics.bestTrade
            ? {
                symbol: metrics.bestTrade.symbol,
                profitLoss: metrics.bestTrade.profitLoss,
                note: `${metrics.bestTrade.type} trade, R:R ${metrics.bestTrade.rewardRiskRatio || "not logged"}`
              }
            : null,
          worstTrade: metrics.worstTrade
            ? {
                symbol: metrics.worstTrade.symbol,
                profitLoss: metrics.worstTrade.profitLoss,
                note: `${metrics.worstTrade.type} trade, R:R ${metrics.worstTrade.rewardRiskRatio || "not logged"}`
              }
            : null
        },
        trades: dailyTrades.map((trade) => ({
          symbol: trade.symbol,
          type: trade.type,
          profitLoss: trade.profitLoss,
          profitLossPercent: trade.profitLossPercent,
          riskPercent: trade.riskPercent,
          rewardRiskRatio: trade.rewardRiskRatio,
          emotion: trade.emotion || "Not provided",
          notes: trade.notes || "Not provided",
          aiReviewSummary: getReviewTextForDailySummary(trade.aiReview),
          aiReviewMistakes: trade.aiReview?.possibleMistakes || []
        }))
      };
    }

    function getExportFileName(extension) {
      return `trading-journal-${getTodayDate()}.${extension}`;
    }

    function downloadFile(content, fileName, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function escapeCsvValue(value) {
      const text = String(value ?? "");

      if (/[",\n\r]/.test(text)) {
        return `"${text.replace(/"/g, '""')}"`;
      }

      return text;
    }

    function createCsvExport(trades) {
      const headers = [
        "Date",
        "Symbol",
        "Type",
        "Entry Price",
        "Exit Price",
        "Position Size",
        "Account Balance Before",
        "Risk Amount",
        "Stop Loss Price",
        "Take Profit Price",
        "Risk %",
        "Reward/Risk Ratio",
        "High Risk",
        "Profit/Loss",
        "Profit/Loss %",
        "Emotion",
        "Notes",
        "Screenshot URL",
        "Uploaded Screenshot",
        "Screenshot File",
        "AI Review Summary",
        "AI Improvement Suggestion",
        "AI Review Date"
      ];

      const rows = trades.map((trade) => {
        const tradeWithResults = addTradeResults(trade);

        return [
          tradeWithResults.date,
          tradeWithResults.symbol,
          tradeWithResults.type,
          tradeWithResults.entryPrice,
          tradeWithResults.exitPrice,
          tradeWithResults.positionSize,
          tradeWithResults.accountBalanceBefore || "",
          tradeWithResults.riskAmount || "",
          tradeWithResults.stopLossPrice || "",
          tradeWithResults.takeProfitPrice || "",
          tradeWithResults.riskPercent,
          tradeWithResults.rewardRiskRatio,
          tradeWithResults.isHighRisk ? "Yes" : "No",
          tradeWithResults.profitLoss,
          tradeWithResults.profitLossPercent,
          tradeWithResults.emotion,
          tradeWithResults.notes,
          tradeWithResults.screenshotUrl,
          tradeWithResults.screenshotImage ? "Yes" : "No",
          tradeWithResults.screenshotImage?.name || "",
          tradeWithResults.aiReview?.summary || "",
          tradeWithResults.aiReview?.improvementSuggestion || "",
          tradeWithResults.aiReview?.generatedAt || ""
        ];
      });

      return [headers, ...rows]
        .map((row) => row.map(escapeCsvValue).join(","))
        .join("\n");
    }

    function createJsonExport(trades) {
      return JSON.stringify({
        app: "trading-journal",
        version: 1,
        exportedAt: new Date().toISOString(),
        trades
      }, null, 2);
    }

    function getTradesFromJsonBackup(data) {
      if (Array.isArray(data)) {
        return data;
      }

      if (data && typeof data === "object" && Array.isArray(data.trades)) {
        return data.trades;
      }

      return null;
    }

    function validateImportedTrades(data) {
      const importedTrades = getTradesFromJsonBackup(data);

      if (!importedTrades) {
        return {
          error: "JSON must be an array of trades or an object with a trades array."
        };
      }

      const normalizedTrades = ensureUniqueTradeIds(importedTrades.map(normalizeTrade).filter(Boolean));
      const skippedTrades = importedTrades.length - normalizedTrades.length;

      if (importedTrades.length > 0 && normalizedTrades.length === 0) {
        return {
          error: "No valid trades were found in that JSON file."
        };
      }

      return {
        trades: normalizedTrades,
        skippedTrades
      };
    }

    function createTradeId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }

      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function getReviewScoreClass(score) {
      if (score >= 4) {
        return "ai-score-high";
      }

      if (score >= 3) {
        return "ai-score-mid";
      }

      return "ai-score-low";
    }

    function formatReviewGeneratedAt(value) {
      if (!value) {
        return "Just now";
      }

      const date = new Date(value);

      if (Number.isNaN(date.getTime())) {
        return value;
      }

      return new Intl.DateTimeFormat("en-US", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(date);
    }

    function AiReviewContent({ review }) {
      const normalizedReview = normalizeAiReview(review) || createRawAiReview("AI review was saved, but the payload could not be parsed.");
      const hasStructuredReview = Boolean(
        normalizedReview.improvementSuggestion ||
        normalizedReview.possibleMistakes.length ||
        Object.values(normalizedReview.assessments).some(Boolean)
      );
      const mistakes = normalizedReview.possibleMistakes.length
        ? normalizedReview.possibleMistakes
        : ["No major mistake was detected from the logged fields."];

      return (
        <article className="ai-review-card">
          <div className="ai-review-summary">{normalizedReview.summary || "AI review"}</div>

          {hasStructuredReview ? (
            <React.Fragment>
              <div className="ai-review-grid">
                {AI_REVIEW_FIELDS.map((field) => {
                  const score = normalizedReview.scores[field.key];
                  return (
                    <div className="ai-review-row" key={field.key}>
                      <div className="ai-review-label">

      async function fetchTrades() {
        if (!session?.user?.id || !supabaseClient) {
          return;

        setError("");

        try {
          const { data, error } = await supabaseClient
            .from(TRADES_TABLE)
            .select("*")
            .eq("user_id", session.user.id)
            .order("trade_date", { ascending: false })
            .order("created_at", { ascending: false });

          if (error) {
            setError(`Could not load trades: ${error.message}`);
            setTrades([]);
            return;
          }

          const loadedTrades = (data || []).map(fromTradeRow).filter(Boolean);
          console.debug("[ai-review] Supabase reviews loaded", {
            tradesWithReview: loadedTrades
              .filter((trade) => trade.aiReview)
              .map((trade) => ({
                id: trade.id,
                symbol: trade.symbol,
                reviewType: typeof trade.aiReview,
                isRawText: Boolean(trade.aiReview?.isRawText),
                hasSummary: Boolean(trade.aiReview?.summary),
                hasImprovementSuggestion: Boolean(trade.aiReview?.improvementSuggestion)
              })),
            rawReviewPayloads: (data || [])
              .filter((row) => row.ai_review)
              .map((row) => ({
                id: row.id,
                symbol: row.symbol,
                ai_review: row.ai_review
              }))
          });
          setTrades(loadedTrades);
        } catch (error) {
          setError("Could not connect to Supabase. Check your project settings and internet connection.");
          setTrades([]);
        } finally {
          setIsLoadingTrades(false);

      function updateAuthField(event) {
        const { name, value } = event.target;
        setAuthForm((current) => ({ ...current, [name]: value }));
      }

        setAuthMode(mode);

      async function handleAuthSubmit(event) {
        event.preventDefault();

        if (!supabaseClient) {
          setAuthMessage({ type: "error", text: getSupabaseSetupError() });
          return;
        }

        const email = authForm.email.trim();
        const password = authForm.password;

        if (!email || !password) {
          setAuthMessage({ type: "error", text: "Email and password are required." });
          return;
        }

        if (password.length < 6) {
          setAuthMessage({ type: "error", text: "Password must be at least 6 characters." });
          return;
        }

        setIsSaving(true);
        setAuthMessage({ type: "", text: "" });

        try {
          const authRequest = authMode === "register"
            ? supabaseClient.auth.signUp({ email, password })
            : supabaseClient.auth.signInWithPassword({ email, password });
          const { data, error } = await authRequest;

          if (error) {
            setAuthMessage({ type: "error", text: error.message });
            return;
          }

          if (authMode === "register" && !data.session) {
            setAuthMessage({
              type: "success",
              text: "Account created. Check your email to confirm your account, then log in."
            });
            return;
          }

          setAuthMessage({ type: "success", text: "Signed in successfully." });
          setAuthForm({ email: "", password: "" });
        } catch (error) {
          setAuthMessage({ type: "error", text: "Authentication failed. Please try again." });
        } finally {
          setIsSaving(false);
        }
      }

        setIsSaving(true);

          setAuthMessage({ type: "error", text: error.message });

        }

      function exportTradesAsJson() {
        if (trades.length === 0) {
          showBackupMessage("Add at least one trade before exporting.", "error");
          return;
        }

        downloadFile(
          createJsonExport(trades),
          getExportFileName("json"),

        );
        showBackupMessage(`Exported ${trades.length} trades to JSON.`);
      }

      function openImportPicker() {
        importInputRef.current?.click();
      }

      function importTradesFromJson(event) {
        const file = event.target.files?.[0];

        if (!file) {
          return;
        }

        if (!session?.user?.id || !supabaseClient) {
          showBackupMessage("Log in before importing trades.", "error");
          event.target.value = "";
          return;
        }

        const reader = new FileReader();

        reader.onerror = () => {
          showBackupMessage("Could not read that JSON file.", "error");
        };

        reader.onload = async () => {
          try {
            const parsedBackup = JSON.parse(String(reader.result || ""));
            const validation = validateImportedTrades(parsedBackup);

            if (validation.error) {
              showBackupMessage(validation.error, "error");
              return;
            }

            const skippedText = validation.skippedTrades
              ? ` ${validation.skippedTrades} invalid ${validation.skippedTrades === 1 ? "trade was" : "trades were"} skipped.`
              : "";
            const confirmed = window.confirm(
              `Import ${validation.trades.length} trades from ${file.name}? This will replace your current ${trades.length} trades.${skippedText}`
            );

            if (!confirmed) {
              showBackupMessage("Import canceled.");
              return;
            }

            const rowsToInsert = validation.trades
              .map((trade) => toTradeRow(trade, session.user.id))
              .filter(Boolean);

            if (rowsToInsert.length !== validation.trades.length) {
              showBackupMessage("Some trades could not be prepared for Supabase import.", "error");
              return;
            }

            setIsSaving(true);

            if (rowsToInsert.length === 0) {
              const { error: deleteError } = await supabaseClient
                .from(TRADES_TABLE)
                .delete()
                .eq("user_id", session.user.id);

              if (deleteError) {
                showBackupMessage(`Import failed while clearing trades: ${deleteError.message}`, "error");
                return;
              }

              setTrades([]);
              resetForm();
              resetFilters();
              showBackupMessage("Imported an empty JSON backup. Your Supabase journal is now empty.");
              return;
            }

            const { data, error } = await supabaseClient
              .from(TRADES_TABLE)
              .insert(rowsToInsert)
              .select();

            if (error) {
              showBackupMessage(`Import failed: ${error.message}`, "error");
              return;
            }

            const previousTradeIds = trades.map((trade) => trade.id).filter(Boolean);

            if (previousTradeIds.length > 0) {
              const { error: deleteError } = await supabaseClient
                .from(TRADES_TABLE)
                .delete()
                .in("id", previousTradeIds);

              if (deleteError) {
                await fetchTrades();
                showBackupMessage(
                  `Imported ${validation.trades.length} trades, but old trades could not be removed: ${deleteError.message}`,
                  "error"
                );
                return;
              }
            }

            setTrades((data || []).map(fromTradeRow).filter(Boolean));
            resetForm();
            resetFilters();
            showBackupMessage(`Imported ${validation.trades.length} trades from JSON.${skippedText}`);
          } catch (error) {
            const message = error instanceof SyntaxError
              ? "That file is not valid JSON. Your journal was not changed."
              : "Import failed. Your journal was not changed.";
            showBackupMessage(message, "error");
          } finally {
            setIsSaving(false);
          }
        };

        reader.readAsText(file);
        event.target.value = "";
      }

      function validateForm() {
        if (!form.symbol.trim()) {
          return "Pair or symbol is required.";
        }

        if (!form.date) {
          return "Date is required.";
        }

        const entry = parseTradeNumber(form.entryPrice);
        const exit = parseTradeNumber(form.exitPrice);
        const size = parseTradeNumber(form.positionSize);
        const optionalRiskFields = [
          ["Account balance before trade", form.accountBalanceBefore],
          ["Risk amount", form.riskAmount],
          ["Stop loss price", form.stopLossPrice],
          ["Take profit price", form.takeProfitPrice]
        ];

        if (!Number.isFinite(entry) || entry <= 0) {
          return "Entry price must be greater than 0.";
        }

        if (!Number.isFinite(exit) || exit <= 0) {
          return "Exit price must be greater than 0.";
        }

        if (!Number.isFinite(size) || size <= 0) {
          return "Position size must be greater than 0.";
        }

        for (const [label, value] of optionalRiskFields) {
          if (value !== "" && parseOptionalTradeNumber(value) === null) {
            return `${label} must be greater than 0 when provided.`;
          }
        }

        if (!isValidScreenshotUrl(form.screenshotUrl)) {
          return "Screenshot URL must start with http:// or https://.";
        }

        return "";
      }

      async function handleSubmit(event) {
        event.preventDefault();

        const validationMessage = validateForm();
        if (validationMessage) {
          setError(validationMessage);
          return;
        }

        if (!session?.user?.id || !supabaseClient) {
          setError("Log in before saving trades.");
          return;
        }

        const tradeData = normalizeTrade({
          ...form,
          id: editingId || createTradeId(),
          symbol: form.symbol.trim().toUpperCase(),
          entryPrice: parseTradeNumber(form.entryPrice),
          exitPrice: parseTradeNumber(form.exitPrice),
          positionSize: parseTradeNumber(form.positionSize),
          accountBalanceBefore: parseOptionalTradeNumber(form.accountBalanceBefore),
          riskAmount: parseOptionalTradeNumber(form.riskAmount),
          stopLossPrice: parseOptionalTradeNumber(form.stopLossPrice),
          takeProfitPrice: parseOptionalTradeNumber(form.takeProfitPrice),
          emotion: form.emotion.trim(),
          notes: form.notes.trim(),
          screenshotUrl: form.screenshotUrl.trim(),
          screenshotImage: form.screenshotImage
        });

        if (!tradeData) {
          setError("Trade data is invalid. Check the symbol, prices, and size.");
          return;
        }

        const rowData = toTradeRow(tradeData, session.user.id);

        if (!rowData) {
          setError("Trade data is invalid. Check the symbol, prices, and size.");
          return;
        }

        setIsSaving(true);
        setError("");

        try {
          if (editingId) {
            const { data, error } = await supabaseClient
              .from(TRADES_TABLE)
              .update(rowData)
              .eq("id", editingId)
              .select()
              .single();

            if (error) {
              setError(`Could not update trade: ${error.message}`);
              return;
            }

            const savedTrade = fromTradeRow(data);
            if (!savedTrade) {
              setError("Supabase returned invalid trade data.");
              return;
            }

            setTrades((current) =>
              current.map((trade) => (trade.id === editingId ? savedTrade : trade))
            );
          } else {
            const { data, error } = await supabaseClient
              .from(TRADES_TABLE)
              .insert(rowData)
              .select()
              .single();

            if (error) {
              setError(`Could not save trade: ${error.message}`);
              return;
            }

            const savedTrade = fromTradeRow(data);
            if (!savedTrade) {
              setError("Supabase returned invalid trade data.");
              return;
            }

            setTrades((current) => [savedTrade, ...current]);
          }

          resetForm();
        } catch (error) {
          setError("Could not save trade. Check your Supabase connection and table setup.");
        } finally {
          setIsSaving(false);
        }
      }

        const trade = trades.find((item) => item.id === id);

        if (!confirmed) {

        if (!supabaseClient) {
          setError("Supabase is not configured.");
          return;

        setIsSaving(true);
        setError("");

        try {
          const { error } = await supabaseClient
            .from(TRADES_TABLE)
            .delete()
            .eq("id", id);

          if (error) {
            setError(`Could not delete trade: ${error.message}`);

          setTrades((current) => current.filter((item) => item.id !== id));
          if (editingId === id) {
            resetForm();

          if (reviewTradeId === id) {

          setError("Could not delete trade. Check your Supabase connection.");
